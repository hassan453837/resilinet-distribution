kind = "web"
previewPath = "/"
title = "ResiliNet — Emergency Response Coordinator"
version = "1.0.0"
id = "artifacts/resilinet"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23332

[services.development]
run = "pnpm --filter @workspace/resilinet run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/resilinet", "run", "build" ]
publicDir = "artifacts/resilinet/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23332"
BASE_PATH = "/"
